<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Local NotebookLM</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #1e293b;
    color: #f8fafc;
    padding: 14px 24px;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  header span { color: #94a3b8; font-weight: 400; font-size: 0.85rem; margin-left: 10px; }

  main {
    display: flex;
    gap: 16px;
    padding: 20px;
    flex: 1;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── Left panel: upload + document list ── */
  .panel-left {
    width: 320px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 16px;
  }
  .card h2 { font-size: 0.85rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }

  .upload-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  #fileInput { flex: 1; min-width: 0; font-size: 0.85rem; }
  .btn {
    padding: 7px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 0.875rem;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-primary:disabled { background: #93c5fd; cursor: default; }

  #uploadStatus { font-size: 0.8rem; margin-top: 8px; color: #64748b; min-height: 1em; }
  #uploadStatus.error { color: #dc2626; }
  #uploadStatus.ok { color: #16a34a; }

  #docList { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  #docList li {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 0.82rem;
  }
  #docList li .doc-name { font-weight: 500; word-break: break-all; }
  #docList li .doc-meta { color: #94a3b8; margin-top: 2px; }
  #docList li.empty { color: #94a3b8; font-style: italic; text-align: center; padding: 12px; }

  /* ── Right panel: chat ── */
  .panel-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
    min-width: 0;
  }

  .chat-card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }
  .chat-card h2 { font-size: 0.85rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; padding: 14px 16px 0; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 400px;
  }

  .msg { display: flex; flex-direction: column; gap: 4px; max-width: 85%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 0.9rem;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .msg-bubble { background: #3b82f6; color: #fff; border-bottom-right-radius: 3px; }
  .msg.assistant .msg-bubble { background: #f1f5f9; color: #1e293b; border-bottom-left-radius: 3px; }

  .msg-sources {
    font-size: 0.75rem;
    color: #94a3b8;
    padding: 0 4px;
  }
  .msg-sources strong { color: #64748b; }
  .source-tag {
    display: inline-block;
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    border-radius: 4px;
    padding: 1px 6px;
    margin: 2px 2px 0 0;
    font-size: 0.72rem;
    color: #475569;
  }

  .thinking { color: #94a3b8; font-style: italic; font-size: 0.85rem; align-self: flex-start; }

  .chat-input-row {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid #e2e8f0;
  }
  #questionInput {
    flex: 1;
    padding: 9px 12px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    font-size: 0.9rem;
    resize: none;
    font-family: inherit;
    min-height: 40px;
    max-height: 120px;
    overflow-y: auto;
  }
  #questionInput:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px #bfdbfe; }

  .empty-chat {
    align-self: center;
    margin: auto;
    text-align: center;
    color: #94a3b8;
    font-size: 0.9rem;
  }
  .empty-chat p:first-child { font-size: 2rem; margin-bottom: 8px; }
</style>
</head>
<body>
<header>Local NotebookLM <span>100% local · no cloud · powered by Ollama</span></header>

<main>
  <!-- Left panel -->
  <div class="panel-left">
    <div class="card">
      <h2>Upload Documents</h2>
      <div class="upload-row">
        <input type="file" id="fileInput" accept=".pdf,.txt,.md" />
        <button class="btn btn-primary" id="uploadBtn" onclick="uploadFile()">Upload</button>
      </div>
      <div id="uploadStatus"></div>
    </div>

    <div class="card">
      <h2>Documents</h2>
      <ul id="docList"><li class="empty">No documents yet</li></ul>
    </div>
  </div>

  <!-- Right panel -->
  <div class="panel-right">
    <div class="chat-card">
      <h2>Chat</h2>
      <div id="messages">
        <div class="empty-chat">
          <p>💬</p>
          <p>Upload a document, then ask a question about it.</p>
        </div>
      </div>
      <div class="chat-input-row">
        <textarea id="questionInput" placeholder="Ask a question about your documents…" rows="1"
          onkeydown="handleKey(event)"></textarea>
        <button class="btn btn-primary" id="sendBtn" onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>
</main>

<script>
const API = "http://localhost:8000";

// ── Document list ──────────────────────────────────────────────────────────
async function loadDocs() {
  try {
    const res = await fetch(`${API}/documents`);
    const docs = await res.json();
    const list = document.getElementById("docList");
    if (!docs.length) {
      list.innerHTML = '<li class="empty">No documents yet</li>';
      return;
    }
    list.innerHTML = docs.map(d => `
      <li>
        <div class="doc-name">${esc(d.filename)}</div>
        <div class="doc-meta">${d.chunk_count} chunks · ${fmtDate(d.upload_time)}</div>
      </li>`).join("");
  } catch {
    // backend not up yet — silent, user will see it when they try to upload
  }
}

// ── Upload ─────────────────────────────────────────────────────────────────
async function uploadFile() {
  const input = document.getElementById("fileInput");
  const status = document.getElementById("uploadStatus");
  const btn = document.getElementById("uploadBtn");
  if (!input.files.length) { setStatus("Please select a file first.", "error"); return; }

  btn.disabled = true;
  setStatus("Uploading and embedding…");

  const form = new FormData();
  form.append("file", input.files[0]);

  try {
    const res = await fetch(`${API}/upload`, { method: "POST", body: form });
    const data = await res.json();
    if (!res.ok) { setStatus(data.detail || "Upload failed.", "error"); return; }
    setStatus(`✓ ${esc(data.filename)} — ${data.chunks} chunks indexed.`, "ok");
    input.value = "";
    loadDocs();
  } catch (e) {
    setStatus("Cannot reach backend. Is the server running on port 8000?", "error");
  } finally {
    btn.disabled = false;
  }
}

function setStatus(msg, cls = "") {
  const el = document.getElementById("uploadStatus");
  el.textContent = msg;
  el.className = cls;
}

// ── Chat ───────────────────────────────────────────────────────────────────
let chatActive = false;

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

async function sendChat() {
  if (chatActive) return;
  const input = document.getElementById("questionInput");
  const question = input.value.trim();
  if (!question) return;

  clearEmptyState();
  addMessage("user", question);
  input.value = "";

  chatActive = true;
  document.getElementById("sendBtn").disabled = true;

  const thinkingEl = addThinking();

  try {
    const res = await fetch(`${API}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question }),
    });
    const data = await res.json();
    thinkingEl.remove();
    if (!res.ok) { addMessage("assistant", `Error: ${data.detail || "Unknown error"}`); return; }
    addMessage("assistant", data.answer, data.sources);
  } catch {
    thinkingEl.remove();
    addMessage("assistant", "Cannot reach backend. Is the server running on port 8000?");
  } finally {
    chatActive = false;
    document.getElementById("sendBtn").disabled = false;
  }
}

function clearEmptyState() {
  const msgs = document.getElementById("messages");
  const empty = msgs.querySelector(".empty-chat");
  if (empty) empty.remove();
}

function addMessage(role, text, sources = []) {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `msg ${role}`;

  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.textContent = text;
  div.appendChild(bubble);

  if (sources && sources.length) {
    const srcEl = document.createElement("div");
    srcEl.className = "msg-sources";
    srcEl.innerHTML = `<strong>Sources:</strong> ` +
      sources.map(s => `<span class="source-tag">${esc(s.filename)} #${s.chunk_index}</span>`).join(" ");
    div.appendChild(srcEl);
  }

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function addThinking() {
  const msgs = document.getElementById("messages");
  const el = document.createElement("div");
  el.className = "thinking";
  el.textContent = "Thinking…";
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function fmtDate(iso) {
  if (!iso) return "";
  try { return new Date(iso).toLocaleDateString(); } catch { return ""; }
}

// Initial load
loadDocs();
</script>
</body>
</html>
